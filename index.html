<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Техно — Каталог товаров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка сайта с фирменным логотипом и меню -->
    <header>
        <div class="header-left">
            <div class="logo-container">
                <div class="mi-badge">mi</div>
                <div class="techno-text">Техно</div>
            </div>
            <!-- Навигация (Меню) -->
            <nav class="nav-menu">
                <a href="#" class="nav-item active">Каталог</a>
            </nav>
        </div>
        <div class="cart">🛒 Корзина: <span id="cart-count">0</span> шт.</div>
    </header>

    <!-- Основной контент страницы -->
    <main class="catalog-container">
        <h2 class="section-title">📦 Каталог товаров</h2>
        
        <!-- Сетка, куда JS будет загружать товары из Google Таблицы -->
        <div class="products">
            <!-- Сюда script.js подставит карточки -->
            <p class="loading-text">Загрузка каталога...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
